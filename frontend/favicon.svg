<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- House body -->
  <rect x="14" y="30" width="36" height="26" rx="2" fill="#3b82f6"/>
  <!-- Roof -->
  <polygon points="8,32 32,10 56,32" fill="#1e40af"/>
  <!-- Door -->
  <rect x="26" y="40" width="12" height="16" rx="1" fill="#1e3a8a"/>
  <!-- Window left -->
  <rect x="18" y="36" width="6" height="6" rx="1" fill="#93c5fd"/>
  <!-- Window right -->
  <rect x="40" y="36" width="6" height="6" rx="1" fill="#93c5fd"/>
  <!-- Gear (automation symbol) -->
  <g transform="translate(48,18)" fill="#f59e0b">
    <circle cx="0" cy="0" r="5" fill="#f59e0b"/>
    <circle cx="0" cy="0" r="2.5" fill="#1e40af"/>
    <rect x="-1.2" y="-8" width="2.4" height="4" rx="1"/>
    <rect x="-1.2" y="4" width="2.4" height="4" rx="1"/>
    <rect x="-8" y="-1.2" width="4" height="2.4" rx="1"/>
    <rect x="4" y="-1.2" width="4" height="2.4" rx="1"/>
    <rect x="3.2" y="-6.8" width="2.4" height="4" rx="1" transform="rotate(45 4.4 -4.8)"/>
    <rect x="-6.8" y="3.2" width="2.4" height="4" rx="1" transform="rotate(45 -5.6 5.2)"/>
    <rect x="3.2" y="3.2" width="2.4" height="4" rx="1" transform="rotate(-45 4.4 5.2)"/>
    <rect x="-6.8" y="-6.8" width="2.4" height="4" rx="1" transform="rotate(-45 -5.6 -4.8)"/>
  </g>
</svg>
