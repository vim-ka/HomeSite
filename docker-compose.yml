services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      mosquitto:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/sensors.db
    volumes:
      - db-data:/app/data
      - backend-logs:/app/logs
    restart: unless-stopped

  device_gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    depends_on:
      mosquitto:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/sensors.db
      - BACKEND_URL=http://backend:8000
    volumes:
      - db-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  db-data:
  backend-logs:
  mosquitto-data:
  mosquitto-log:
